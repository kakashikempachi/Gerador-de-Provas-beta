<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Provas Pro v7.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <style>
        :root { --cobalt: #1e3a8a; --bg: #f1f5f9; --emerald: #059669; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        .toolbar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); sticky; top: 10px; z-index: 1000; }
        
        .card-questao { background: white; padding: 20px; border-radius: 8px; margin-top: 15px; border-left: 6px solid var(--cobalt); position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .remover { position: absolute; right: 15px; top: 15px; color: #ef4444; cursor: pointer; border: none; background: none; font-size: 20px; }
        
        textarea { width: 100%; min-height: 60px; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin: 5px 0; }
        
        /* Galeria de Imagens no Editor */
        .area-imagens { margin-top: 15px; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 8px; background: #f8fafc; }
        .grid-fotos-editor { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .foto-item { width: 120px; background: white; padding: 5px; border: 1px solid #e2e8f0; border-radius: 4px; text-align: center; }
        .foto-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 2px; }
        
        /* Modal de Busca de Imagem */
        #modal-busca { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .resultados-busca { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .resultados-busca img { width: 100%; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .resultados-busca img:hover { transform: scale(1.05); border: 3px solid var(--cobalt); }

        /* Estilos PDF */
        #folha-a4 { background: white; width: 210mm; margin: auto; display: none; color: black; }
        .pagina-pdf { padding: 20mm; min-height: 297mm; box-sizing: border-box; }
        .cabecalho-pdf { border: 2pt solid black; padding: 15px; margin-bottom: 30px; font-size: 11pt; }
        .q-pdf { margin-bottom: 30px; page-break-inside: avoid; width: 100%; display: block; }
        .galeria-pdf { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .figura-pdf { width: calc(33.3% - 15px); text-align: center; font-size: 10pt; }
        .figura-pdf img { width: 100%; border: 0.5pt solid black; }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <strong>🏫 Identificação Escolar</strong>
        <input type="text" id="input-escola" placeholder="Nome da Escola..." style="width: 100%;">
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <select id="select-tipo" style="flex: 1; padding: 10px; border-radius: 8px;">
                <option value="imagem">🖼️ Questão com Imagens/Figuras</option>
                <option value="multipla">🔘 Múltipla Escolha</option>
                <option value="ligue">🔗 Ligue os Pontos</option>
                <option value="dissertativa">📝 Dissertativa</option>
            </select>
            <button onclick="adicionarQuestao()" style="flex: 1; background: var(--cobalt); color: white; border: none; border-radius: 8px; cursor: pointer;">＋ Add Questão</button>
        </div>
        <button onclick="gerarPDF()" style="width: 100%; background: var(--emerald); color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer;">📥 Gerar Prova (PDF)</button>
    </div>

    <div id="editor"></div>
</div>

<div id="modal-busca">
    <div class="modal-content">
        <h3>🔍 Buscar Imagens Educativas</h3>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="termo-busca" placeholder="Ex: Mapa do Brasil, Célula, Leão..." style="flex: 1;">
            <button onclick="buscarImagensAPI()" style="padding: 10px;">Buscar</button>
            <button onclick="fecharModal()" style="background: #ddd; border: none; padding: 10px;">X</button>
        </div>
        <div class="resultados-busca" id="resultados"></div>
    </div>
</div>

<div id="folha-a4">
    <div class="pagina-pdf">
        <div class="cabecalho-pdf">
            <center><strong id="pdf-escola">NOME DA ESCOLA</strong></center>
            <p>ALUNO(A): _______________________________________ DATA: ___/___/___</p>
            <p>PROF(A): ________________________________________ SÉRIE: _________</p>
        </div>
        <div id="pdf-conteudo"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
