<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Provas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Gerador de Provas</h1>
  <button onclick="window.print()">📄 Exportar / Imprimir</button>
</header>

<section class="config">
  <input type="text" placeholder="Nome da Prova" id="titulo">
  <input type="text" placeholder="Disciplina">
  <input type="text" placeholder="Série">
</section>

<section>
  <button onclick="adicionarQuestao('multipla')">➕ Múltipla Escolha</button>
  <button onclick="adicionarQuestao('dissertativa')">➕ Dissertativa</button>
  <button onclick="adicionarQuestao('vf')">➕ Verdadeiro/Falso</button>
  <button onclick="adicionarQuestao('lacuna')">➕ Lacuna</button>
</section>

<section id="prova"></section>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
