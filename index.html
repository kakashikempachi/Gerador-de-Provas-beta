<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Provas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<!-- FORÇA ATUALIZAÇÃO DO CSS -->
<link rel="stylesheet" href="styles.css?v=3">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="main">

<h1>📚 Gerador de Provas</h1>

<div class="botoes">
<button onclick="adicionarQuestao('multipla')">Múltipla</button>
<button onclick="adicionarQuestao('vf')">V/F</button>
<button onclick="adicionarQuestao('dissertativa')">Dissertativa</button>
<button onclick="adicionarQuestao('curta')">Curta</button>
<button onclick="adicionarQuestao('lacuna')">Lacuna</button>
<button onclick="adicionarQuestao('colunas')">Colunas</button>
<button onclick="adicionarQuestao('ordenar')">Ordenar</button>
<button onclick="adicionarQuestao('circule')">Circule</button>
<button onclick="adicionarQuestao('arme')">Arme</button>
</div>

<button class="export" onclick="window.print()">📄 Exportar PDF</button>

<div class="cabecalho">
<input placeholder="Nome da Escola">
<input placeholder="Disciplina">
<input placeholder="Professor(a)">
<input placeholder="Série / Ano">
<input placeholder="Data">

<div class="linha-aluno">
Nome: ____________________________________________<br><br>
Nota: ______
</div>
</div>

<div id="prova"></div>

</div>

<script src="app.js?v=3"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
