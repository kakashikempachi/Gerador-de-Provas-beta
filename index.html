<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Provas v8.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <style>
        :root { --cobalt: #1e3a8a; --emerald: #059669; }
        body { font-family: sans-serif; background: #f1f5f9; padding-bottom: 50px; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* Toolbar e Botões */
        .toolbar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-add { 
            background: var(--cobalt); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
        }
        .btn-add:active { background: #111827; transform: scale(0.98); }
        
        /* Cards */
        .card-questao { background: white; padding: 20px; border-radius: 8px; margin-top: 15px; border-left: 6px solid var(--cobalt); position: relative; }
        .remover { position: absolute; right: 10px; top: 10px; color: red; cursor: pointer; border: none; background: none; font-size: 20px; }
        
        /* Modal de Busca */
        #modal-busca { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-inner { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; }
        .img-result { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .img-result img { width: 100%; border-radius: 4px; cursor: pointer; }

        /* PDF oculto */
        #folha-a4 { display: none; background: white; width: 210mm; padding: 20mm; }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <h3>🏫 Editor de Provas</h3>
        <input type="text" id="escola-nome" placeholder="Nome da Escola..." style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
        
        <div style="display: flex; gap: 10px;">
            <select id="tipo-questao" style="flex: 2; padding: 10px; border-radius: 8px;">
                <option value="multipla">Múltipla Escolha</option>
                <option value="imagem">Questão com Imagem</option>
                <option value="ligue">Ligue os Pontos</option>
                <option value="dissertativa">Dissertativa</option>
            </select>
            <button class="btn-add" id="btn-trigger">＋ Add Questão</button>
        </div>
        
        <button onclick="gerarPDF()" style="width:100%; margin-top:10px; padding:15px; background:var(--emerald); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">📥 BAIXAR PROVA (PDF)</button>
    </div>

    <div id="lista-questoes"></div>
</div>

<div id="modal-busca">
    <div class="modal-inner">
        <h4>Buscar Imagem (PNG)</h4>
        <input type="text" id="input-busca" placeholder="Ex: Mapa, Animais..." style="width:70%; padding:8px;">
        <button onclick="buscarPixabay()">Ir</button>
        <button onclick="fecharModal()">X</button>
        <div id="resultados" class="img-result"></div>
    </div>
</div>

<div id="folha-a4">
    <div id="pdf-conteudo"></div>
</div>

<script src="script.js"></script>
</body>
</html>
